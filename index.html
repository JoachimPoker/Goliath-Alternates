<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goliath Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
  <style>
    body { padding-top: 6vh; } 
    .ticker-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 6vh; z-index: 9999; }
  </style>
</head>
<body>
  <div class="ticker-wrap" style="display:none;">
    <div class="ticker-content" id="tickerText"></div>
  </div>

  <div class="container py-4">
    <div class="text-center mb-4 border-bottom border-secondary pb-3">
      <h2 style="color:var(--text-gold); font-weight:900; letter-spacing:1px;">GOLIATH HUB</h2>
      <p class="text-secondary small">LIVE TOURNAMENT TRACKER</p>
    </div>

    <div id="tournamentList"></div>

    <div class="flat-card mt-5">
      <h4 class="text-white mb-3">Find Your Table</h4>
      <input type="number" id="mapSearch" class="form-control map-input mb-3" placeholder="Enter Table # (e.g. 45)">
      
      <div id="mapContainer" style="position:relative; border: 2px solid #444; border-radius:8px; overflow:hidden; height: 400px; background: #111; cursor: grab;">
        <div id="svgWrapper" style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;">
           <p class="text-secondary mt-5" id="mapLoadingText">Loading map...</p>
        </div>
      </div>
      <div id="mapFeedback" class="mt-2 fw-bold text-center text-warning"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>
  <script src="js/supabase-config.js"></script>
  
  <script>
    // --- 1. LOAD TICKER ---
    async function loadTicker() {
      const { data } = await _supabase.from('messages').select('*').eq('show_on_home', true).order('created_at');
      const tickerBox = document.getElementById('tickerText');
      const wrap = document.querySelector('.ticker-wrap');
      
      if (!data || data.length === 0) {
        wrap.style.display = 'none';
        document.body.style.paddingTop = '20px';
      } else {
        wrap.style.display = 'flex';
        document.body.style.paddingTop = '8vh';
        
        const baseString = data.map(m => m.text).join(' &nbsp;&nbsp;&nbsp;***&nbsp;&nbsp;&nbsp; ');
        const repeatedString = Array(20).fill(baseString).join(' &nbsp;&nbsp;&nbsp;***&nbsp;&nbsp;&nbsp; ');
        tickerBox.innerHTML = `<div class="ticker-item">${repeatedString}</div>`;
        
        const pixelsPerSecond = 100; 
        const totalWidth = tickerBox.scrollWidth;
        const duration = totalWidth / pixelsPerSecond;
        tickerBox.style.animationDuration = `${duration}s`;
      }
    }

    // --- 2. LOAD HOME ---
    async function loadHome() {
      const { data } = await _supabase.from('tournaments').select('*').eq('is_active', true).order('created_at');
      const list = document.getElementById('tournamentList');

      if (!data || data.length === 0) {
        list.innerHTML = `
          <div class="text-center py-5 text-secondary">
            <h3 class="fw-bold" style="opacity:0.5;">NO ACTIVE EVENTS</h3>
            <p>Please check back later.</p>
          </div>
        `;
        return;
      }
      
      list.innerHTML = data.map(t => {
        // 1. Status logic
        let mainText = "";
        let mainColor = "text-white"; 

        if (t.status_mode === 'OPEN') { 
            mainText = "IMMEDIATE SEATING"; mainColor = "text-success"; 
        } 
        else if (t.status_mode === 'ALL') { 
            mainText = "ALL ALTERNATES"; mainColor = "text-danger"; 
        } 
        else if (t.status_mode === 'BREAK') { 
            mainText = `AFTER BREAK: UP TO #${t.current_alt_number}`; mainColor = "text-info"; 
        } 
        else { 
            mainText = `CALLING UP TO #${t.current_alt_number}`; mainColor = "text-warning"; 
        }

        // 2. Render the Card
        return `
        <div class="flat-card">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <span class="badge bg-dark border border-secondary">${t.start_time}</span>
            <span class="badge bg-dark border border-secondary">${t.location || 'TBD'}</span>
          </div>
          <div class="tourn-title">${t.name}</div>
          <div class="border-top border-secondary pt-3 mt-2 text-center">
            <div class="display-5 fw-bold ${mainColor}" style="line-height:1.1">${mainText}</div>
          </div>
        </div>
      `}).join('');
    }

    // --- 3. INTERACTIVE MAP LOGIC ---
    let panzoomInstance = null;

    async function initMaps() {
      const wrapper = document.getElementById('svgWrapper');
      wrapper.innerHTML = ''; 

      try {
        const response = await fetch('main-hall.svg');
        if(!response.ok) throw new Error("File not found");
        const svgText = await response.text();
        
        const mapDiv = document.createElement('div');
        mapDiv.style.width = '100%';
        mapDiv.style.height = '100%';
        mapDiv.innerHTML = svgText;
        
        const svgElement = mapDiv.querySelector('svg');
        if(svgElement) {
          svgElement.style.width = '100%';
          svgElement.style.height = '100%';
          svgElement.id = `svg-main`;
        }
        wrapper.appendChild(mapDiv);
      } catch(e) {
        wrapper.innerHTML = `<p class="text-danger mt-5">Could not load main-hall.svg. Ensure it is in the same folder.</p>`;
      }

      panzoomInstance = Panzoom(wrapper, {
        maxScale: 4,
        minScale: 1,
        contain: 'outside'
      });
      wrapper.parentElement.addEventListener('wheel', panzoomInstance.zoomWithWheel);
    }

    function clearPathAndHighlights() {
      document.querySelectorAll('.table-highlight').forEach(el => el.classList.remove('table-highlight'));
      document.querySelectorAll('svg').forEach(svg => svg.classList.remove('map-dimmed'));
      const existingPath = document.getElementById('dynamic-path');
      if (existingPath) existingPath.remove();
    }

    document.getElementById('mapSearch').addEventListener('input', (e) => {
      const tableNum = parseInt(e.target.value);
      const feedback = document.getElementById('mapFeedback');
      clearPathAndHighlights();
      
      if (isNaN(tableNum)) { feedback.innerText = ''; return; }

      const svgMap = document.getElementById(`svg-main`);
      // MUST MATCH YOUR SVG LAYER NAMES EXACTLY
      const tableEl = document.getElementById(`Table-${tableNum}`);
      const entranceEl = document.getElementById('entrance-main');

      if (!svgMap) return;

      if (!tableEl) {
         feedback.innerText = `Table ${tableNum} not found on this map.`;
         return;
      }
      feedback.innerText = "";

      svgMap.classList.add('map-dimmed');
      tableEl.classList.add('table-highlight');

      if (entranceEl) {
        try {
            const tBox = tableEl.getBBox();
            const eBox = entranceEl.getBBox();
            const tX = tBox.x + (tBox.width / 2);
            const tY = tBox.y + (tBox.height / 2);
            const eX = eBox.x + (eBox.width / 2);
            const eY = eBox.y + (eBox.height / 2);

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("id", "dynamic-path");
            path.setAttribute("class", "wayfinder-path");
            path.setAttribute("d", `M ${eX} ${eY} L ${eX} ${tY} L ${tX} ${tY}`);
            
            svgMap.appendChild(path);
        } catch(error) {
            console.log("Could not draw path. Ensure entrance-main exists in SVG.", error);
        }
      }
    });

    window.addEventListener('DOMContentLoaded', initMaps);

    // Initial Loaders
    _supabase.channel('public').on('postgres_changes', {event:'*', schema:'public'}, () => { loadHome(); loadTicker(); }).subscribe();
    loadHome();
    loadTicker();
  </script>
</body>
</html>
